<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<title>My Site</title>
</head>

<body>

<img id="randomImage" width="1080">

<audio id="openSound" src="sound.mp3"></audio>

<script>

// ランダム画像
const images = [
  "1.jpg",
  "2.jpg",
  "3.jpg",
  "4.jpg",
  "5.jpg",
  "6.jpg",
  "7.jpg",
  "8.jpg",
  "9.jpg"
];

const randomIndex =
  Math.floor(Math.random() * images.length);

document.getElementById("randomImage").src =
  images[randomIndex];

document.body.addEventListener("click", function () {
    document.getElementById("openSound").play();
}, { once: true });

// 音再生
window.addEventListener("load", function () {

    const audio =
      document.getElementById("openSound");

    audio.play().catch(function(err) {

        console.log(
          "自動再生がブロックされました",
          err
        );

    });

});

</script>

</body>
</html>

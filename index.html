<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>占いサイト</title>

<style>
body{
    margin:0;
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
    font-family:sans-serif;
}

.card-container{
    width:520px;
    height:320px;
    perspective:1200px;
    cursor:pointer;
}

.card{
    width:100%;
    height:100%;
    position:relative;
    transform-style:preserve-3d;
    transition:transform 1.2s;
}

.card.flip{
    transform:rotateY(180deg);
}

.face{
    position:absolute;
    width:100%;
    height:100%;
    backface-visibility:hidden;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 0 30px rgba(255,255,255,0.2);
}

.face img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.back{
    transform:rotateY(180deg);
}

.message{
    position:absolute;
    bottom:20px;
    width:100%;
    text-align:center;
    color:white;
    font-size:20px;
    text-shadow:0 0 10px black;
}
</style>
</head>

<body>

<div class="card-container" id="fortuneCard">
    <div class="card" id="card">

        <!-- 表 -->
        <div class="face front">
            <img src="title.jpg" alt="タイトル">
            <div class="message">クリックで占う</div>
        </div>

        <!-- 裏 -->
        <div class="face back">
            <img id="resultImage" src="" alt="結果">
        </div>

    </div>
</div>

<audio id="flipSound" src="sound.mp3"></audio>

<script>

const card = document.getElementById("card");
const resultImage = document.getElementById("resultImage");
const sound = document.getElementById("flipSound");

const images = [
    "1.jpg",
    "2.jpg",
    "3.jpg",
    "4.jpg",
    "5.jpg"
];

let flipped = false;

document.getElementById("fortuneCard").addEventListener("click", () => {

    if(flipped) return;

    // ランダム画像
    const randomImage = images[Math.floor(Math.random() * images.length)];
    resultImage.src = randomImage;

    // 音再生
    sound.currentTime = 0;
    sound.play();

    // 裏返し
    card.classList.add("flip");

    flipped = true;
});

</script>

</body>
</html>
